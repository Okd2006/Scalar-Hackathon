name: incident-response-env
version: "1.0.0"
description: >
  A real-world on-call incident response environment where an AI agent
  acts as an SRE engineer. The agent must investigate production incidents,
  identify root causes, escalate to the correct team, apply fixes, and
  write postmortems.

tags:
  - openenv
  - incident-response
  - sre
  - real-world

observation_space:
  type: object
  fields:
    step: integer
    alerts: list[string]
    logs: dict[string, list[string]]
    metrics: dict[string, any]
    available_actions: list[string]
    message: string
    task_id: string
    task_description: string

action_space:
  type: object
  fields:
    action_type:
      type: enum
      values: [investigate, escalate, apply_fix, postmortem, no_op]
    target:
      type: string
      description: Service name, team name, or fix identifier
    details:
      type: string
      description: Optional postmortem text or explanation

reward:
  range: [-1.0, 1.0]
  partial_credit: true
  description: >
    Rewards are given for each correct investigative step, escalation,
    fix, and postmortem quality. Penalties are applied for wrong fixes,
    wrong escalations, and repeated no-ops.

tasks:
  - id: task_easy
    title: Single Service Outage
    difficulty: easy
    max_steps: 10
    description: >
      The payment-service is returning 500 errors due to a database
      connection limit. Identify the root cause, escalate to the right
      team, and apply the correct fix.

  - id: task_medium
    title: Cascading Microservice Failure
    difficulty: medium
    max_steps: 15
    description: >
      Multiple services are degraded due to a cascading failure originating
      from an OOM condition in redis-cache. Identify the origin, escalate,
      fix, and write a postmortem.

  - id: task_hard
    title: Intermittent Auth Failure with Data Corruption Risk
    difficulty: hard
    max_steps: 20
    description: >
      Users are intermittently failing to authenticate due to a partial
      JWT secret rotation. Investigate multiple services, identify the
      config-service as root cause, escalate to security-team, apply the
      correct fix, and write a detailed postmortem.

endpoints:
  reset:
    method: POST
    path: /reset
    params:
      task_id: string
    returns: Observation

  step:
    method: POST
    path: /step
    params:
      task_id: string
    body: Action
    returns: StepResult

  state:
    method: GET
    path: /state
    params:
      task_id: string
    returns: StateModel
